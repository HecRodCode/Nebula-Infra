x-airflow-common: &airflow-common
  image: apache/airflow:2.10.5
  environment:
    _PIP_ADDITIONAL_REQUIREMENTS: "apache-airflow-providers-amazon"
  env_file:
    - .env
  volumes:
    - airflow_logs:/opt/airflow/logs
    - airflow_config:/opt/airflow/config
    - airflow_plugins:/opt/airflow/plugins
    - /home/ubuntu/Nebula-Infra/pipelines/dag:/opt/airflow/dags
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    postgres:
      condition: service_healthy

services:

  postgres:
    image: postgres:13
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    user: "0:0"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PYTHONPATH: ${PYTHONPATH}
    command:
      - -c
      - |
        mkdir -p /opt/airflow/{logs,dags,plugins,config}
        chown -R "${AIRFLOW_UID}:0" /opt/airflow/
        airflow db migrate
        airflow users create \
          --username ${_AIRFLOW_WWW_USER_USERNAME} \
          --password ${_AIRFLOW_WWW_USER_PASSWORD} \
          --firstname Admin \
          --lastname Admin \
          --role Admin \
          --email admin@admin.com 2>/dev/null || echo "Usuario ya existe, continuando..."

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    restart: unless-stopped
    environment:
      PYTHONPATH: ${PYTHONPATH}
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    restart: unless-stopped
    environment:
      PYTHONPATH: ${PYTHONPATH}
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-triggerer:
    <<: *airflow-common
    command: triggerer
    restart: unless-stopped
    environment:
      PYTHONPATH: ${PYTHONPATH}
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  flower:
    <<: *airflow-common
    command: celery flower
    ports:
      - "5555:5555"
    restart: unless-stopped
    environment:
      PYTHONPATH: ${PYTHONPATH}
    depends_on:
      airflow-init:
        condition: service_completed_successfully

volumes:
  airflow_logs:
  airflow_config:
  airflow_plugins:
  postgres_data: